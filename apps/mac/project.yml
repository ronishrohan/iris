name: Iris
options:
  bundleIdPrefix: dev.ronish.iris
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
targets:
  Iris:
    type: application
    platform: macOS
    sources:
      - path: Iris
    resources:
      - path: Iris/Resources
    info:
      path: Iris/Info.plist
      properties:
        CFBundleDisplayName: Iris
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: YES
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSMicrophoneUsageDescription: Iris listens for your wake phrase and your commands.
        NSSpeechRecognitionUsageDescription: Iris transcribes your speech on-device to understand what you want.
        NSAppleEventsUsageDescription: Iris controls other apps (Messages, Spotify, Music) to do what you ask.
        NSCalendarsUsageDescription: Iris can read and create calendar events when you ask.
        NSRemindersUsageDescription: Iris can read and create reminders when you ask.
        NSContactsUsageDescription: Iris uses contacts to send messages and emails when you ask.
        NSSystemAdministrationUsageDescription: Iris uses accessibility to register global hotkeys and control system volume.
    entitlements:
      path: Iris/Iris.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.personal-information.reminders: true
        com.apple.security.personal-information.addressbook: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.cs.allow-jit: false
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ronish.iris
        INFOPLIST_FILE: Iris/Info.plist
        CODE_SIGN_ENTITLEMENTS: Iris/Iris.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
